# Release coupling (plan section 12, adapted): the toolkit is consumed
# directly from GitHub (no npm registry). A tag binds the package version,
# this workflow commit SHA, Node major, Playwright/Chromium identity,
# container digest, and schema versions.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  NODE_MAJOR: '22'
  PLAYWRIGHT_VERSION: '1.61.1'
  CHROMIUM_REVISION: '1228'
  CHROMIUM_VERSION: '149.0.7827.55'
  CONTAINER_IMAGE: 'mcr.microsoft.com/playwright:v1.61.1-noble'
  CONTAINER_DIGEST: 'sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48'
  CONTAINER_PLATFORM: 'linux/amd64'
  BASELINE_MANIFEST_SCHEMA_VERSION: '1'
  VISUAL_RESULT_SCHEMA_VERSION: '1'

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          # No caching in the release workflow (cache-poisoning hardening).
          package-manager-cache: false

      - name: Verify tag matches package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "v${version}" ]; then
            echo "Tag ${TAG} does not match package.json version ${version}" >&2
            exit 1
          fi

      # The reusable workflows embed the exact package version they pair with
      # (plan section 12). A release whose workflows expect a different
      # version would fail every consumer run with TOOLKIT_VERSION_MISMATCH.
      - name: Verify workflows embed the release version
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          status=0
          for wf in .github/workflows/visual-baseline.yml .github/workflows/visual-regression.yml; do
            embedded="$(sed -nE "s/^[[:space:]]*EXPECTED_TOOLKIT_VERSION:[[:space:]]*'([^']+)'.*/\1/p" "$wf")"
            if [ -z "$embedded" ]; then
              echo "${wf} does not embed EXPECTED_TOOLKIT_VERSION" >&2
              status=1
            elif [ "$embedded" != "$version" ]; then
              echo "${wf} embeds EXPECTED_TOOLKIT_VERSION '${embedded}', expected '${version}'" >&2
              status=1
            fi
          done
          exit "$status"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Check formatting
        run: |
          set -euo pipefail
          npm run format:check

      - name: Lint
        run: |
          set -euo pipefail
          npm run lint

      - name: Typecheck
        run: |
          set -euo pipefail
          npm run typecheck

      - name: Unit tests
        run: |
          set -euo pipefail
          npm test

      - name: Build
        run: |
          set -euo pipefail
          npm run build

      # The env block above duplicates src/runtime.ts so the release notes can
      # record the coupled runtime identity. Fail the release if either copy
      # (or any container pin in the workflows) drifts from the built package.
      - name: Verify env matches compiled runtime identity
        run: |
          set -euo pipefail
          node --input-type=module - <<'SCRIPT'
          import { readFileSync } from 'node:fs';
          import * as runtime from './dist/runtime.js';
          const pairs = [
            ['NODE_MAJOR', String(runtime.NODE_MAJOR)],
            ['PLAYWRIGHT_VERSION', runtime.PLAYWRIGHT_VERSION],
            ['CHROMIUM_REVISION', runtime.CHROMIUM_REVISION],
            ['CHROMIUM_VERSION', runtime.CHROMIUM_VERSION],
            ['CONTAINER_IMAGE', runtime.CONTAINER_IMAGE],
            ['CONTAINER_DIGEST', runtime.CONTAINER_DIGEST],
            ['CONTAINER_PLATFORM', runtime.CONTAINER_PLATFORM],
            ['BASELINE_MANIFEST_SCHEMA_VERSION', String(runtime.BASELINE_MANIFEST_SCHEMA_VERSION)],
            ['VISUAL_RESULT_SCHEMA_VERSION', String(runtime.VISUAL_RESULT_SCHEMA_VERSION)],
          ];
          const problems = [];
          for (const [name, value] of pairs) {
            if (process.env[name] !== value) {
              problems.push(
                `release.yml env ${name}='${process.env[name] ?? ''}' does not match ` +
                  `dist/runtime.js '${value}'`,
              );
            }
          }
          const pin = `${runtime.CONTAINER_IMAGE}@${runtime.CONTAINER_DIGEST}`;
          const workflows = [
            '.github/workflows/ci.yml',
            '.github/workflows/release.yml',
            '.github/workflows/visual-baseline.yml',
            '.github/workflows/visual-regression.yml',
          ];
          for (const workflow of workflows) {
            const imageLines = readFileSync(workflow, 'utf8')
              .split('\n')
              .filter((line) => /^\s*image:/.test(line));
            for (const line of imageLines) {
              const value = line.replace(/^\s*image:\s*/, '').trim();
              if (value !== pin) {
                problems.push(`${workflow} pins container '${value}', expected '${pin}'`);
              }
            }
          }
          if (problems.length > 0) {
            for (const problem of problems) console.error(problem);
            process.exit(1);
          }
          console.log('Release env matches the compiled runtime identity.');
          SCRIPT

      - name: Verify package contents
        run: |
          set -euo pipefail
          npm pack --dry-run

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Integration tests
        run: |
          set -euo pipefail
          npm run test:integration

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Build
        run: |
          set -euo pipefail
          npm run build

      - name: End-to-end tests
        run: |
          set -euo pipefail
          npm run test:e2e

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIONLINT_VERSION: '1.7.12'
      ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
      ZIZMOR_VERSION: '1.27.0'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "/tmp/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          echo "${ACTIONLINT_SHA256}  /tmp/${archive}" | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp actionlint
          /tmp/actionlint -color

      - name: Run zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pipx run "zizmor==${ZIZMOR_VERSION}" .github/workflows

  release:
    name: Create GitHub release
    needs: [verify, integration, e2e, workflow-security]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          WORKFLOW_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          ## @thisdot/visual-regression ${version}

          The toolkit is consumed directly from GitHub — there is no npm
          registry publication. This tag couples the package, reusable
          workflows, and runtime identity; consumers who want a fixed ref
          instead of tracking main should move the git dependency and the
          workflow ref to this tag together (plan section 12).

          | Component | Value |
          |---|---|
          | Package install ref | \`github:${REPOSITORY}#${TAG}\` (or track \`github:${REPOSITORY}\` for main) |
          | Reusable workflow commit SHA | \`${WORKFLOW_SHA}\` |
          | Node major | ${NODE_MAJOR} |
          | Playwright | ${PLAYWRIGHT_VERSION} |
          | Chromium | revision ${CHROMIUM_REVISION} (${CHROMIUM_VERSION}) |
          | Container | \`${CONTAINER_IMAGE}@${CONTAINER_DIGEST}\` (${CONTAINER_PLATFORM}) |
          | Baseline manifest schema | ${BASELINE_MANIFEST_SCHEMA_VERSION} |
          | Visual result schema | ${VISUAL_RESULT_SCHEMA_VERSION} |

          To pin to this release instead of main:

          \`\`\`bash
          npm install --save-dev github:${REPOSITORY}#${TAG}
          \`\`\`

          \`\`\`yaml
          uses: ${REPOSITORY}/.github/workflows/visual-baseline.yml@${TAG}
          uses: ${REPOSITORY}/.github/workflows/visual-regression.yml@${TAG}
          \`\`\`
          EOF
          gh release create "$TAG" \
            --repo "$REPOSITORY" \
            --verify-tag \
            --title "@thisdot/visual-regression ${version}" \
            --notes-file "$notes_file"
