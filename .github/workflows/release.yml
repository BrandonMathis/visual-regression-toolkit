name: Validate Git tag

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  validate-tag:
    name: Validate tagged toolkit commit
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
          clean: true
      - name: Verify tag and runtime identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$(node --version)" == v22.* ]]
          git show-ref --tags --verify --quiet "refs/tags/$GITHUB_REF_NAME"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$GITHUB_SHA" >> "$GITHUB_ENV"
      - name: Install repository and fixture dependencies
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npm ci --prefix tests/fixtures/next-app --no-audit --no-fund
      - name: Validate tagged source without publishing
        shell: bash
        run: |
          set -euo pipefail
          npm run format:check
          npm run lint
          npm run typecheck
          npm test
          npm run test:integration
          npm run check:schemas
          npm run build
          tarball="$(npm pack --pack-destination "$RUNNER_TEMP" --json | jq -er '.[0].filename')"
          npm install --prefix "$RUNNER_TEMP/packed-toolkit" --ignore-scripts --no-audit --no-fund --no-save "$RUNNER_TEMP/$tarball"
          RUN_NEXT_FIXTURE_E2E=1 \
          VISUAL_REGRESSION_AUTHORITATIVE=1 \
          VISUAL_REGRESSION_TOOLKIT_COMMIT="$GITHUB_SHA" \
          VISUAL_REGRESSION_CLI="$RUNNER_TEMP/packed-toolkit/node_modules/@thisdot/visual-regression/dist/cli/main.js" \
            npm run test:e2e
          npm run check:package
          npm run check:workflows
          npm audit --audit-level=high
      - name: Summarize Git-only tag
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Visual regression toolkit tag

          - Git tag: \`$GITHUB_REF_NAME\`
          - Toolkit commit: \`$GITHUB_SHA\`
          - Distribution: GitHub source only; no npm package was published
          - Consumer channel: \`BrandonMathis/visual-regression-toolkit@main\`
          - Playwright: \`1.61.1\` / Chromium revision \`1228\`
          - Container: \`mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6\`
          EOF
