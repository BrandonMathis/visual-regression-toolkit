name: Reusable visual regression

on:
  workflow_call:
    inputs:
      config-path:
        description: Repository-relative visual configuration path
        required: false
        type: string
        default: visual-regression.config.ts
      baseline-workflow-file:
        description: Baseline caller workflow filename in the consumer repository
        required: false
        type: string
        default: visual-baseline.yml
      node-version:
        description: Supported Node major; only 22 is accepted
        required: false
        type: string
        default: "22"
      visual-diffs-are-informational:
        description: Convert only a fully validated visual difference to advisory success
        required: false
        type: boolean
        default: true

permissions: {}

concurrency:
  group: visual-compare-${{ github.repository_id }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.base.sha }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  toolkit-identity:
    name: Resolve reusable workflow main commit
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      id-token: write
    outputs:
      toolkit-commit: ${{ steps.identity.outputs.toolkit-commit }}
    steps:
      - name: Read the called workflow commit from GitHub's OIDC claim
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          void (async () => {
            const url = `${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=visual-regression-toolkit`;
            const response = await fetch(url, {
              headers: { Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` },
            });
            if (!response.ok) throw new Error(`OIDC token request failed: ${response.status}`);
            const { value } = await response.json();
            const payload = JSON.parse(Buffer.from(value.split('.')[1], 'base64url').toString('utf8'));
            const expected = 'brandonmathis/visual-regression-toolkit/.github/workflows/visual-regression.yml@refs/heads/main';
            if (String(payload.job_workflow_ref).toLowerCase() !== expected ||
                !/^[a-f0-9]{40}$/.test(String(payload.job_workflow_sha))) {
              throw new Error('Called workflow is not the expected GitHub main workflow');
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `toolkit-commit=${payload.job_workflow_sha}\n`);
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exitCode = 1;
          });
          NODE
  identity:
    name: Validate candidate identity and contract
    needs: toolkit-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    outputs:
      base-sha: ${{ steps.context.outputs.base-sha }}
      head-sha: ${{ steps.context.outputs.head-sha }}
      merge-sha: ${{ steps.context.outputs.merge-sha }}
      base-branch: ${{ steps.context.outputs.base-branch }}
      repository-id: ${{ steps.context.outputs.repository-id }}
      contract: ${{ steps.contract.outputs.contract }}
    env:
      CONFIG_PATH: ${{ inputs.config-path }}
      EXPECTED_NODE: ${{ inputs.node-version }}
      TOOLKIT_COMMIT: ${{ needs.toolkit-identity.outputs.toolkit-commit }}
    steps:
      - name: Capture immutable pull request identity
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_SHA: ${{ github.sha }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPOSITORY_ID: ${{ github.repository_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EVENT_NAME" == "pull_request" ]]
          [[ "$BASE_SHA" =~ ^[a-f0-9]{40}$ && "$HEAD_SHA" =~ ^[a-f0-9]{40}$ && "$MERGE_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$REPOSITORY_ID" =~ ^[1-9][0-9]*$ && "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]
          [[ "$BASE_BRANCH" =~ ^[A-Za-z0-9._/-]{1,255}$ ]]
          [[ "$EXPECTED_NODE" == "22" && "$(node --version)" == v22.* && "$(uname -m)" == x86_64 ]]
          case "$CONFIG_PATH" in /*|*\\*|*..*) exit 1;; esac
          [[ "$CONFIG_PATH" =~ ^[A-Za-z0-9._/-]{1,1024}$ ]]
          printf 'base-sha=%s\nhead-sha=%s\nmerge-sha=%s\nbase-branch=%s\nrepository-id=%s\n' "$BASE_SHA" "$HEAD_SHA" "$MERGE_SHA" "$BASE_BRANCH" "$REPOSITORY_ID" >> "$GITHUB_OUTPUT"
      - name: Load the toolkit from the called workflow commit
        shell: bash
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          : > "$RUNNER_TEMP/empty-npmrc"
          mkdir -p "$RUNNER_TEMP/toolkit-source"
          git -C "$RUNNER_TEMP/toolkit-source" init
          git -C "$RUNNER_TEMP/toolkit-source" remote add origin https://github.com/BrandonMathis/visual-regression-toolkit.git
          # shellcheck disable=SC2153
          git -C "$RUNNER_TEMP/toolkit-source" fetch --depth 1 origin "$TOOLKIT_COMMIT"
          git -C "$RUNNER_TEMP/toolkit-source" checkout --detach FETCH_HEAD
          toolkit_commit="$(git -C "$RUNNER_TEMP/toolkit-source" rev-parse HEAD)"
          [[ "$toolkit_commit" == "$TOOLKIT_COMMIT" ]]
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --prefix "$RUNNER_TEMP/toolkit-source" --ignore-scripts --no-audit --no-fund
          npm run build --prefix "$RUNNER_TEMP/toolkit-source"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$toolkit_commit" >> "$GITHUB_ENV"
      - name: Check out the synthetic merge commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false
          clean: true
          submodules: false
          lfs: false
      - name: Verify merge parents
        env:
          BASE_SHA: ${{ steps.context.outputs.base-sha }}
          HEAD_SHA: ${{ steps.context.outputs.head-sha }}
          MERGE_SHA: ${{ steps.context.outputs.merge-sha }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$MERGE_SHA" ]]
          mapfile -t parents < <(git show -s --format='%P' HEAD | tr ' ' '\n')
          [[ "${#parents[@]}" -eq 2 && "${parents[0]}" == "$BASE_SHA" && "${parents[1]}" == "$HEAD_SHA" ]]
      - name: Install untrusted consumer dependencies without credentials
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/empty-npmrc"
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --no-audit --no-fund
      - name: Compute candidate contract with the called workflow commit
        id: contract
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          value="$(node "$CLI" workflow inspect-consumer --root "$GITHUB_WORKSPACE" --config "$CONFIG_PATH")"
          contract="$(printf '%s' "$value" | jq -er '.contractHash | select(test("^[a-f0-9]{64}$"))')"
          printf 'contract=%s\n' "$contract" >> "$GITHUB_OUTPUT"

  resolve-baseline:
    name: Resolve exact base-SHA baseline
    needs: [toolkit-identity, identity]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    outputs:
      relay-id: ${{ steps.relay.outputs.artifact-id }}
      relay-digest: ${{ steps.relay.outputs.artifact-digest }}
      manifest-sha: ${{ steps.resolve.outputs.manifest-sha }}
      source-run-id: ${{ steps.resolve.outputs.source-run-id }}
      source-run-attempt: ${{ steps.resolve.outputs.source-run-attempt }}
    steps:
      - name: Load the trusted resolver from the main commit selected at job start
        env:
          TOOLKIT_COMMIT: ${{ needs.toolkit-identity.outputs.toolkit-commit }}
        shell: bash
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          : > "$RUNNER_TEMP/empty-npmrc"
          mkdir -p "$RUNNER_TEMP/toolkit-source"
          git -C "$RUNNER_TEMP/toolkit-source" init
          git -C "$RUNNER_TEMP/toolkit-source" remote add origin https://github.com/BrandonMathis/visual-regression-toolkit.git
          # shellcheck disable=SC2153
          git -C "$RUNNER_TEMP/toolkit-source" fetch --depth 1 origin "$TOOLKIT_COMMIT"
          git -C "$RUNNER_TEMP/toolkit-source" checkout --detach FETCH_HEAD
          toolkit_commit="$(git -C "$RUNNER_TEMP/toolkit-source" rev-parse HEAD)"
          [[ "$toolkit_commit" == "$TOOLKIT_COMMIT" ]]
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --prefix "$RUNNER_TEMP/toolkit-source" --ignore-scripts --no-audit --no-fund
          npm run build --prefix "$RUNNER_TEMP/toolkit-source"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$toolkit_commit" >> "$GITHUB_ENV"
      - name: Query, quarantine, verify, and select baseline
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ needs.identity.outputs.base-sha }}
          BASE_BRANCH: ${{ needs.identity.outputs.base-branch }}
          CONTRACT_HASH: ${{ needs.identity.outputs.contract }}
          REPOSITORY_ID: ${{ needs.identity.outputs.repository-id }}
          WORKFLOW_FILE: ${{ inputs.baseline-workflow-file }}
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          value="$(node "$CLI" workflow resolve-baseline --repository "$GITHUB_REPOSITORY" --repository-id "$REPOSITORY_ID" --base-sha "$BASE_SHA" --contract-hash "$CONTRACT_HASH" --base-branch "$BASE_BRANCH" --workflow-file "$WORKFLOW_FILE" --output "$RUNNER_TEMP/selected-baseline" --wait-seconds 600)"
          {
            printf 'manifest-sha=%s\n' "$(printf '%s' "$value" | jq -er '.manifestSha | select(test("^[a-f0-9]{64}$"))')"
            printf 'source-run-id=%s\n' "$(printf '%s' "$value" | jq -er '.runId | select(test("^[1-9][0-9]*$"))')"
            printf 'source-run-attempt=%s\n' "$(printf '%s' "$value" | jq -er '.runAttempt | select(type == "number" and . >= 1)')"
          } >> "$GITHUB_OUTPUT"
          node "$CLI" baseline verify "$RUNNER_TEMP/selected-baseline" --json > "$RUNNER_TEMP/resolver-verification.json"
          node "$CLI" workflow scan-tree --path "$RUNNER_TEMP/selected-baseline" > "$RUNNER_TEMP/resolver-tree.json"
      - name: Relay the verified baseline by immutable artifact ID
        id: relay
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baseline-relay-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/selected-baseline
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false
          include-hidden-files: true
      - name: Validate relay outputs
        shell: bash
        run: |
          set -euo pipefail
          [[ '${{ steps.relay.outputs.artifact-id }}' =~ ^[1-9][0-9]*$ ]]
          [[ '${{ steps.relay.outputs.artifact-digest }}' =~ ^sha256:[a-f0-9]{64}$ ]]

  compare:
    name: Capture and compare synthetic merge
    needs: [toolkit-identity, identity, resolve-baseline]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      capture-exit: ${{ steps.capture.outputs.exit-code }}
      evidence-id: ${{ steps.evidence.outputs.artifact-id }}
      evidence-digest: ${{ steps.evidence.outputs.artifact-digest }}
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    env:
      CONFIG_PATH: ${{ inputs.config-path }}
      VISUAL_REGRESSION_AUTHORITATIVE: "1"
      BASE_SHA: ${{ needs.identity.outputs.base-sha }}
      HEAD_SHA: ${{ needs.identity.outputs.head-sha }}
      MERGE_SHA: ${{ needs.identity.outputs.merge-sha }}
      BASE_BRANCH: ${{ needs.identity.outputs.base-branch }}
      CONTRACT_HASH: ${{ needs.identity.outputs.contract }}
      TOOLKIT_COMMIT: ${{ needs.toolkit-identity.outputs.toolkit-commit }}
    steps:
      - name: Check out the same synthetic merge commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.identity.outputs.merge-sha }}
          fetch-depth: 2
          persist-credentials: false
          clean: true
          submodules: false
          lfs: false
      - name: Reverify candidate identity and install dependencies
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$MERGE_SHA" ]]
          [[ "$(git show -s --format='%P' HEAD)" == "$BASE_SHA $HEAD_SHA" ]]
          : > "$RUNNER_TEMP/empty-npmrc"
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --no-audit --no-fund
          export GIT_TERMINAL_PROMPT=0
          mkdir -p "$RUNNER_TEMP/toolkit-source"
          git -C "$RUNNER_TEMP/toolkit-source" init
          git -C "$RUNNER_TEMP/toolkit-source" remote add origin https://github.com/BrandonMathis/visual-regression-toolkit.git
          # shellcheck disable=SC2153
          git -C "$RUNNER_TEMP/toolkit-source" fetch --depth 1 origin "$TOOLKIT_COMMIT"
          git -C "$RUNNER_TEMP/toolkit-source" checkout --detach FETCH_HEAD
          toolkit_commit="$(git -C "$RUNNER_TEMP/toolkit-source" rev-parse HEAD)"
          [[ "$toolkit_commit" == "$TOOLKIT_COMMIT" ]]
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --prefix "$RUNNER_TEMP/toolkit-source" --ignore-scripts --no-audit --no-fund
          npm run build --prefix "$RUNNER_TEMP/toolkit-source"
          export VISUAL_REGRESSION_TOOLKIT_COMMIT="$toolkit_commit"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$toolkit_commit" >> "$GITHUB_ENV"
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          value="$(node "$CLI" workflow inspect-consumer --root "$GITHUB_WORKSPACE" --config "$CONFIG_PATH")"
          [[ "$(printf '%s' "$value" | jq -er .contractHash)" == "$CONTRACT_HASH" ]]
      - name: Download resolver relay by artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.resolve-baseline.outputs.relay-id }}
          path: ${{ runner.temp }}/selected-baseline
          merge-multiple: true
      - name: Verify relayed baseline immediately after download
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          node "$CLI" baseline verify "$RUNNER_TEMP/selected-baseline" --json > "$RUNNER_TEMP/download-verification.json"
          digest="$(sha256sum "$RUNNER_TEMP/selected-baseline/baseline-manifest.json" | cut -d' ' -f1)"
          [[ "$digest" == '${{ needs.resolve-baseline.outputs.manifest-sha }}' ]]
      - name: Compare and preserve CLI exit
        id: capture
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .visual-regression playwright-report/visual test-results/visual
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          node "$CLI" baseline verify "$RUNNER_TEMP/selected-baseline" --json > "$RUNNER_TEMP/precompare-verification.json"
          set +e
          node "$CLI" compare --json --config "$CONFIG_PATH" --baseline "$RUNNER_TEMP/selected-baseline" --repository "$GITHUB_REPOSITORY" --source-sha "$MERGE_SHA" --base-sha "$BASE_SHA" --base-branch "$BASE_BRANCH" --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT"
          code=$?
          set -e
          printf 'exit-code=%s\n' "$code" >> "$GITHUB_OUTPUT"
      - name: Pre-scan fixed evidence paths
        id: evidence-scan
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          node "$CLI" workflow scan-tree --path .visual-regression/result
          for directory in .visual-regression/candidate .visual-regression/baseline playwright-report/visual test-results/visual; do
            if [[ -d "$directory" ]]; then node "$CLI" workflow scan-tree --path "$directory"; fi
          done
      - name: Upload bounded visual evidence
        id: evidence
        if: always() && steps.evidence-scan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-regression-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .visual-regression/result
            .visual-regression/candidate
            .visual-regression/baseline
            playwright-report/visual
            test-results/visual
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
          overwrite: false
          include-hidden-files: true

  trusted-gate:
    name: Validate untrusted result and enforce disposition
    needs: [toolkit-identity, identity, resolve-baseline, compare]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
    steps:
      - name: Load the trusted gate from the main commit selected at job start
        env:
          TOOLKIT_COMMIT: ${{ needs.toolkit-identity.outputs.toolkit-commit }}
        shell: bash
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          : > "$RUNNER_TEMP/empty-npmrc"
          mkdir -p "$RUNNER_TEMP/toolkit-source"
          git -C "$RUNNER_TEMP/toolkit-source" init
          git -C "$RUNNER_TEMP/toolkit-source" remote add origin https://github.com/BrandonMathis/visual-regression-toolkit.git
          # shellcheck disable=SC2153
          git -C "$RUNNER_TEMP/toolkit-source" fetch --depth 1 origin "$TOOLKIT_COMMIT"
          git -C "$RUNNER_TEMP/toolkit-source" checkout --detach FETCH_HEAD
          toolkit_commit="$(git -C "$RUNNER_TEMP/toolkit-source" rev-parse HEAD)"
          [[ "$toolkit_commit" == "$TOOLKIT_COMMIT" ]]
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --prefix "$RUNNER_TEMP/toolkit-source" --ignore-scripts --no-audit --no-fund
          npm run build --prefix "$RUNNER_TEMP/toolkit-source"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$toolkit_commit" >> "$GITHUB_ENV"
      - name: Validate immutable evidence relay identity
        env:
          EVIDENCE_ID: ${{ needs.compare.outputs.evidence-id }}
          EVIDENCE_DIGEST: ${{ needs.compare.outputs.evidence-digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EVIDENCE_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$EVIDENCE_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]
      - name: Download untrusted evidence by artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.compare.outputs.evidence-id }}
          path: ${{ runner.temp }}/evidence
          merge-multiple: true
      - name: Validate result with code never exposed to consumer execution
        id: gate
        env:
          CAPTURE_EXIT: ${{ needs.compare.outputs.capture-exit }}
          MERGE_SHA: ${{ needs.identity.outputs.merge-sha }}
          BASE_SHA: ${{ needs.identity.outputs.base-sha }}
          CONTRACT_HASH: ${{ needs.identity.outputs.contract }}
          INFORMATIONAL: ${{ inputs.visual-diffs-are-informational }}
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          node "$CLI" workflow scan-tree --path "$RUNNER_TEMP/evidence" > "$RUNNER_TEMP/evidence-tree.json"
          if [[ -d "$RUNNER_TEMP/evidence/.visual-regression/baseline" ]]; then
            node "$CLI" baseline verify "$RUNNER_TEMP/evidence/.visual-regression/baseline" --json > "$RUNNER_TEMP/evidence-baseline.json"
          fi
          value="$(node "$CLI" workflow validate-result --root "$RUNNER_TEMP/evidence" --operation compare --exit-code "$CAPTURE_EXIT" --candidate-sha "$MERGE_SHA" --baseline-sha "$BASE_SHA" --contract-hash "$CONTRACT_HASH" --summary "$RUNNER_TEMP/visual-summary.md" --informational "$INFORMATIONAL")"
          conclusion="$(printf '%s' "$value" | jq -er '.conclusion | select(. == "success" or . == "advisory" or . == "failure")')"
          printf 'conclusion=%s\n' "$conclusion" >> "$GITHUB_OUTPUT"
      - name: Publish trusted summary and enforce disposition
        env:
          CONCLUSION: ${{ steps.gate.outputs.conclusion }}
        shell: bash
        run: |
          set -euo pipefail
          cat "$RUNNER_TEMP/visual-summary.md" >> "$GITHUB_STEP_SUMMARY"
          case "$CONCLUSION" in
            success) exit 0 ;;
            advisory)
              echo '::warning title=Visual differences detected::Validated visual differences are informational; download the evidence artifact.'
              exit 0
              ;;
            failure) exit 1 ;;
            *) exit 1 ;;
          esac
