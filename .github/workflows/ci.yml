name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.repository_id }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          clean: true
      - name: Assert supported Node runtime
        run: '[[ "$(node --version)" == v22.* ]]'
      - name: Install exact dependencies
        run: npm ci --no-audit --no-fund
      - name: Repository checks
        run: |
          set -euo pipefail
          npm run format:check
          npm run lint
          npm run typecheck
          npm test
          npm run test:integration
          npm run check:schemas
          npm run build
          npm run check:package
          npm audit --audit-level=high
      - name: Enforce immutable workflow references
        run: npm run check:workflows
  browser:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          clean: true
      - run: '[[ "$(node --version)" == v22.* ]]'
      - run: npm ci --no-audit --no-fund
      - run: npm ci --prefix tests/fixtures/next-app --no-audit --no-fund
      - name: Run packed authoritative browser and Next fixture lifecycle
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          tarball="$(npm pack --pack-destination "$RUNNER_TEMP" --json | jq -er '.[0].filename')"
          npm install --prefix "$RUNNER_TEMP/packed-toolkit" --ignore-scripts --no-audit --no-fund --no-save "$RUNNER_TEMP/$tarball"
          RUN_NEXT_FIXTURE_E2E=1 \
          VISUAL_REGRESSION_AUTHORITATIVE=1 \
          VISUAL_REGRESSION_TOOLKIT_COMMIT="$GITHUB_SHA" \
          VISUAL_REGRESSION_CLI="$RUNNER_TEMP/packed-toolkit/node_modules/@thisdot/visual-regression/dist/cli/main.js" \
            npm run test:e2e
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
  workflow-security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          clean: true
      - name: Install and run actionlint 1.7.7
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output "$archive" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          echo '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  '"$archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint"
      - name: Run zizmor 1.27.0
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 1.27.0
          advanced-security: false
          online-audits: false
          persona: auditor
          min-severity: medium
