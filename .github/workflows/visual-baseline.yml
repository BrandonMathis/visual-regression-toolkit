name: Reusable visual baseline

on:
  workflow_call:
    inputs:
      config-path:
        description: Repository-relative visual configuration path
        required: false
        type: string
        default: visual-regression.config.ts
      node-version:
        description: Supported Node major; only 22 is accepted
        required: false
        type: string
        default: "22"
      retention-days:
        description: Immutable baseline artifact retention
        required: false
        type: number
        default: 90

permissions: {}

concurrency:
  group: visual-baseline-${{ github.repository_id }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  toolkit-identity:
    name: Resolve reusable workflow main commit
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      id-token: write
    outputs:
      toolkit-commit: ${{ steps.identity.outputs.toolkit-commit }}
    steps:
      - name: Read the called workflow commit from GitHub's OIDC claim
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          void (async () => {
            const url = `${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=visual-regression-toolkit`;
            const response = await fetch(url, {
              headers: { Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` },
            });
            if (!response.ok) throw new Error(`OIDC token request failed: ${response.status}`);
            const { value } = await response.json();
            const payload = JSON.parse(Buffer.from(value.split('.')[1], 'base64url').toString('utf8'));
            const expected = 'brandonmathis/visual-regression-toolkit/.github/workflows/visual-baseline.yml@refs/heads/main';
            if (String(payload.job_workflow_ref).toLowerCase() !== expected ||
                !/^[a-f0-9]{40}$/.test(String(payload.job_workflow_sha))) {
              throw new Error('Called workflow is not the expected GitHub main workflow');
            }
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `toolkit-commit=${payload.job_workflow_sha}\n`);
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exitCode = 1;
          });
          NODE
  publish:
    name: Capture and publish exact-SHA baseline
    needs: toolkit-identity
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6
      options: --platform linux/amd64
    env:
      CONFIG_PATH: ${{ inputs.config-path }}
      SOURCE_SHA: ${{ github.sha }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      EXPECTED_NODE: ${{ inputs.node-version }}
      VISUAL_REGRESSION_AUTHORITATIVE: "1"
      TOOLKIT_COMMIT: ${{ needs.toolkit-identity.outputs.toolkit-commit }}
    steps:
      - name: Validate immutable publication identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$DEFAULT_BRANCH" =~ ^[A-Za-z0-9._/-]{1,255}$ ]]
          [[ "${GITHUB_REF}" == "refs/heads/${DEFAULT_BRANCH}" ]]
          [[ "$EXPECTED_NODE" == "22" ]]
          [[ "$(node --version)" == v22.* ]]
          [[ "$(uname -m)" == "x86_64" ]]
          case "$CONFIG_PATH" in /*|*\\*|*..*) exit 1;; esac
          [[ "$CONFIG_PATH" =~ ^[A-Za-z0-9._/-]{1,1024}$ ]]
          date -u +'%Y-%m-%dT%H:%M:%S.000Z' > "$RUNNER_TEMP/logical-date"
      - name: Load the toolkit from the called workflow commit
        shell: bash
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          : > "$RUNNER_TEMP/empty-npmrc"
          mkdir -p "$RUNNER_TEMP/toolkit-source"
          git -C "$RUNNER_TEMP/toolkit-source" init
          git -C "$RUNNER_TEMP/toolkit-source" remote add origin https://github.com/BrandonMathis/visual-regression-toolkit.git
          # shellcheck disable=SC2153
          git -C "$RUNNER_TEMP/toolkit-source" fetch --depth 1 origin "$TOOLKIT_COMMIT"
          git -C "$RUNNER_TEMP/toolkit-source" checkout --detach FETCH_HEAD
          toolkit_commit="$(git -C "$RUNNER_TEMP/toolkit-source" rev-parse HEAD)"
          [[ "$toolkit_commit" == "$TOOLKIT_COMMIT" ]]
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --prefix "$RUNNER_TEMP/toolkit-source" --ignore-scripts --no-audit --no-fund
          npm run build --prefix "$RUNNER_TEMP/toolkit-source"
          printf 'VISUAL_REGRESSION_TOOLKIT_COMMIT=%s\n' "$toolkit_commit" >> "$GITHUB_ENV"
      - name: Check out the default-branch source SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false
          clean: true
          submodules: false
          lfs: false
      - name: Verify checked-out consumer source
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$SOURCE_SHA" ]]
      - name: Install consumer dependencies without credentials
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/empty-npmrc"
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/empty-npmrc" npm ci --no-audit --no-fund
      - name: Verify toolkit main and compute contract
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          test -f "$CLI"
          value="$(node "$CLI" workflow inspect-consumer --root "$GITHUB_WORKSPACE" --config "$CONFIG_PATH")"
          contract="$(printf '%s' "$value" | jq -er '.contractHash | select(test("^[a-f0-9]{64}$"))')"
          {
            printf 'contract=%s\n' "$contract"
            printf 'logical-date=%s\n' "$(cat "$RUNNER_TEMP/logical-date")"
            printf 'artifact-name=visual-baseline-%s-%s-%s-%s\n' "${SOURCE_SHA:0:12}" "${contract:0:12}" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT"
          } >> "$GITHUB_OUTPUT"
      - name: Create baseline and preserve CLI exit
        id: capture
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .visual-regression playwright-report/visual test-results/visual
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          set +e
          node "$CLI" baseline create --json --config "$CONFIG_PATH" --repository "$GITHUB_REPOSITORY" --source-sha "$SOURCE_SHA" --base-sha "$SOURCE_SHA" --base-branch "$DEFAULT_BRANCH" --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" --logical-date "${{ steps.identity.outputs.logical-date }}"
          code=$?
          set -e
          printf 'exit-code=%s\n' "$code" >> "$GITHUB_OUTPUT"
      - name: Verify completed baseline in a fresh process
        if: steps.capture.outputs.exit-code == '0'
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          node "$CLI" baseline verify .visual-regression/baseline --json > "$RUNNER_TEMP/baseline-verification.json"
          node "$CLI" workflow scan-tree --path .visual-regression/baseline > "$RUNNER_TEMP/baseline-tree.json"
      - name: Validate result and trusted summary
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          value="$(node "$CLI" workflow validate-result --root "$GITHUB_WORKSPACE" --operation baseline-create --exit-code "${{ steps.capture.outputs.exit-code }}" --candidate-sha "$SOURCE_SHA" --contract-hash "${{ steps.identity.outputs.contract }}" --summary "$RUNNER_TEMP/visual-summary.md" --informational false)"
          [[ "$(printf '%s' "$value" | jq -er .conclusion)" == "success" ]]
          printf 'conclusion=success\n' >> "$GITHUB_OUTPUT"
      - name: Upload immutable baseline
        id: baseline-upload
        if: steps.gate.outputs.conclusion == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.identity.outputs.artifact-name }}
          path: .visual-regression/baseline
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}
          compression-level: 0
          overwrite: false
          include-hidden-files: true
      - name: Pre-scan bounded baseline diagnostics
        id: diagnostics-scan
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          CLI="$RUNNER_TEMP/toolkit-source/dist/cli/main.js"
          for directory in .visual-regression/result playwright-report/visual test-results/visual; do
            if [[ -d "$directory" ]]; then node "$CLI" workflow scan-tree --path "$directory"; fi
          done
      - name: Upload bounded baseline diagnostics
        if: always() && steps.diagnostics-scan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baseline-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .visual-regression/result
            playwright-report/visual
            test-results/visual
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6
          overwrite: false
          include-hidden-files: true
      - name: Publish trusted failure summary
        if: always() && steps.gate.outcome == 'failure'
        shell: bash
        run: |
          if [[ -f "$RUNNER_TEMP/visual-summary.md" ]]; then
            cat "$RUNNER_TEMP/visual-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo '## Visual baseline infrastructure error' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Publish trusted job summary
        if: always() && steps.gate.outputs.conclusion == 'success'
        env:
          ARTIFACT_ID: ${{ steps.baseline-upload.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.baseline-upload.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          cat "$RUNNER_TEMP/visual-summary.md" >> "$GITHUB_STEP_SUMMARY"
          printf "\n**Published artifact ID:** \`%s\`  \n**Artifact digest:** \`%s\`\n" "$ARTIFACT_ID" "$ARTIFACT_DIGEST" >> "$GITHUB_STEP_SUMMARY"
          test -n "$ARTIFACT_ID"
          [[ "$ARTIFACT_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]
