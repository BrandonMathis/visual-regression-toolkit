name: Visual Baseline

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used to build the consumer site
        required: false
        type: string
        default: '24'

permissions:
  contents: read

jobs:
  publish-baseline:
    name: Publish main screenshots
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate baseline screenshots
        run: npx --no-install run-visual --update

      - name: Upload main baseline
        uses: actions/upload-artifact@v7
        with:
          name: visual-baseline-screenshots
          path: tests/visual/__screenshots__/
          if-no-files-found: error
          retention-days: 90
